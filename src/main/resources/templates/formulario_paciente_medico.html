<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Paciente - Sistema Farmacia</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>

<body>
    <div class="container">
        <nav class="navbar">
            <div class="navbar-logo">Sistema Farmacia - PACIENTE</div>
            <div class="navbar-links">
                <a href="/logout">Cerrar Sesión</a>
            </div>
        </nav>

        <div th:if="${pacientes != null and #lists.size(pacientes) > 0}">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>DNI</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="paciente : ${pacientes}">
                        <td th:text="${paciente.id}">1</td>
                        <td th:text="${paciente.nombre + ' ' + paciente.apellido}">Juan Pérez</td>
                        <td th:text="${paciente.dni}">12345678</td>
                        <td th:text="${paciente.telefono}">11-1234-5678</td>
                        <form
                            th:action="${paciente.id != null} ? @{'/pacientes/editar/' + ${paciente.id}} : @{/pacientes/guardar}"
                            th:object="${paciente}" method="post">
                            <fieldset>
                                <div sec:authorize="hasRole('MEDICO')">
                                    <label for="historialClinico">Historial Clínico:</label>
                                    <textarea th:field="*{historialClinico}" id="historialClinico"
                                        placeholder="Observaciones, antecedentes, etc."></textarea>
                                </div>
                            </fieldset>
                            <div style="text-align: center; margin-top: 30px;">
                                <button type="submit" class="btn btn-primary"
                                    th:text="${paciente.id != null} ? '💾 Guardar Cambios' : '💾 Registrar Paciente'"></button>
                                <a href="/pacientes" class="btn btn-secondary">❌ Cancelar</a>
                            </div>
                        </form>
        </div>

</body>

</html>
