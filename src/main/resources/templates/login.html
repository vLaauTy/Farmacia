<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Instituto</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Sistema de Gestión Institucional</h1>
            <p class="login-subtitle">Ingresá tus credenciales para continuar</p>

            <div th:if="${param.error != null}" class="message message-error">
                ❌ Usuario o contraseña incorrectos. Por favor, verifica tus credenciales e intenta nuevamente.
            </div>

            <div th:if="${param.logout != null}" class="message message-success">
                ✅ Has cerrado sesión exitosamente.
            </div>


            <form th:action="@{/login}" method="post" class="login-form">
                <label>Usuario:</label>
                <input type="text" name="username" id="username" required autocomplete="username">

                <label for="password">Contraseña:</label>
                <input type="password" name="password" id="password" required autocomplete="current-password">

                <input type="submit" value="Ingresar">
            </form>
        </div>
    </div>

</body>

</html>
